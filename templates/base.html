<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Archivo Correos{% endblock %} — Pietramonte</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --rojo:    #C80C0F;
    --rojo-d:  #9a0a0c;
    --grafito: #394348;
    --grafito-d: #252c30;
    --blanco:  #ffffff;
    --gris-1:  #f5f5f5;
    --gris-2:  #e0e0e0;
    --gris-3:  #9e9e9e;
    --negro:   #111111;
    --font:    'Montserrat', sans-serif;
    --shadow:  0 2px 12px rgba(0,0,0,.12);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font);
    background: var(--gris-1);
    color: var(--grafito-d);
    min-height: 100vh;
  }

  /* ─── NAV ─────────────────────────────────────── */
  nav {
    background: var(--grafito-d);
    border-bottom: 3px solid var(--rojo);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow);
  }
  .nav-brand {
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
  }
  .nav-logo-pm {
    width: 40px;
    height: 40px;
    background: var(--rojo);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    font-size: 16px;
    color: white;
    letter-spacing: -1px;
    flex-shrink: 0;
  }
  .nav-brand-text { display: flex; flex-direction: column; line-height: 1.1; }
  .nav-brand-text span:first-child {
    font-weight: 900;
    font-size: 15px;
    color: var(--blanco);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .nav-brand-text span:last-child {
    font-weight: 300;
    font-size: 10px;
    color: var(--gris-3);
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .nav-right { display: flex; align-items: center; gap: 16px; }
  .nav-user {
    font-size: 13px;
    color: var(--gris-3);
    font-weight: 500;
  }
  .nav-user strong { color: var(--blanco); }
  .btn-salir {
    background: transparent;
    border: 1px solid rgba(255,255,255,.2);
    color: var(--gris-3);
    padding: 6px 14px;
    border-radius: 6px;
    font-family: var(--font);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all .2s;
  }
  .btn-salir:hover { border-color: var(--rojo); color: var(--rojo); }

  /* ─── MAIN ─────────────────────────────────────── */
  main { max-width: 1200px; margin: 0 auto; padding: 2rem; }

  /* ─── MENSAJES ─────────────────────────────────── */
  .messages { list-style: none; margin-bottom: 1rem; }
  .messages li {
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 8px;
  }
  .messages li.error   { background: #fdecea; color: #b71c1c; border-left: 4px solid var(--rojo); }
  .messages li.success { background: #e8f5e9; color: #1b5e20; border-left: 4px solid #4caf50; }
  .messages li.info    { background: #e3f2fd; color: #0d47a1; border-left: 4px solid #2196f3; }

  /* ─── UTILIDADES ───────────────────────────────── */
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 99px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .5px;
    text-transform: uppercase;
  }
  .badge-rojo   { background: var(--rojo); color: white; }
  .badge-gris   { background: var(--gris-2); color: var(--grafito); }

  .divider-rojo {
    height: 3px;
    background: linear-gradient(90deg, var(--rojo) 0%, transparent 100%);
    border: none;
    margin: 0;
  }

  /* Acento diagonal estilo Pietramonte */
  .pm-accent {
    display: inline-block;
    width: 32px;
    height: 3px;
    background: var(--rojo);
    transform: skewX(-20deg);
    margin-right: 8px;
    vertical-align: middle;
  }
</style>
{% block extra_css %}{% endblock %}
</head>
<body>

{% if request.session.buzon_email %}
<nav>
  <a class="nav-brand" href="{% url 'inbox' %}">
    <div class="nav-logo-pm">PM</div>
    <div class="nav-brand-text">
      <span>Pietramonte</span>
      <span>Automotriz</span>
    </div>
  </a>
  <div class="nav-right">
    <span class="nav-user">
      Archivo de <strong>{{ request.session.buzon_email }}</strong>
    </span>
    <a href="{% url 'logout' %}" class="btn-salir">Salir</a>
  </div>
</nav>
{% endif %}

<main>
  {% if messages %}
  <ul class="messages">
    {% for msg in messages %}
    <li class="{{ msg.tags }}">{{ msg }}</li>
    {% endfor %}
  </ul>
  {% endif %}

  {% block content %}{% endblock %}
</main>
</body>
</html>
